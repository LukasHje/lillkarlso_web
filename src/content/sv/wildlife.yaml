hero:
  kicker: Natur och djurliv
  title: Fågelberg, kalkflora och Östersjöns havsmiljö gör Lilla Karlsö till en ovanligt tät naturmiljö.
  intro: På en liten yta ryms klintkolonier, betesmarker, kalkhedar, marina livsmiljöer och ett djurliv som gjort ön känd långt utanför Gotland.
  image: /images/guillimot_on_cliff.jpg
ecology:
  kicker: Ekologi
  title: Ett reservat där kalk, hav och bete formar livsvillkoren
  intro: Platsens biologiska rikedom är resultatet av geologi, saltpåverkan, hävd och kustklimat som fortfarande samverkar.
  body:
    - Kalkberggrunden ger förutsättningar för torra, näringsfattiga miljöer där specialiserade växter som karlsösallat, hjorttunga och kransborre kan leva kvar.
    - Havet för in salt, fukt och vindtryck medan betet håller markerna öppna. Tillsammans skapar dessa processer både fågelberg, blomrika marker och tydliga siktlinjer över landskapet.
habitats:
  - title: Kalkklintar
    text: De branta stupen fungerar både som geologisk signatur och som häckningsmiljö för stora kolonier av sillgrissla och tordmule.
  - title: Alvarlik kalkmark
    text: Tunna jordlager och exponerade hällar skapar ett hårt men artrikt växtsamhälle.
  - title: Strandvallar och låga slätter
    text: Här märks samspelet mellan havsnivå, stenmaterial och vegetation tydligt i landskapet.
  - title: Betade gräsmarker
    text: Öppna ytor med varierad blomning gynnar både botaniska värden och överblick i landskapet.
species:
  - name: Sillgrissla
    category: Sjöfågel
    summary: En av reservatets mest karaktäristiska arter, häckande i stora kolonier på klintavsatserna.
  - name: Tordmule
    category: Sjöfågel
    summary: En tydlig del av ljud- och rörelsebilden över fågelberget, ofta i direkt anslutning till sillgrisslornas kolonier.
  - name: Pilgrimsfalk
    category: Rovfågel
    summary: Kan ses jaga över havet och kring klintarna där fågelkolonierna samlas.
  - name: Ejder
    category: Sjöfågel
    summary: Samlas längs stränderna och är en viktig del av det kustnära fågellivet runt reservatet.
  - name: Gråsäl
    category: Havsdjur
    summary: Lever i vattnen runt ön och knyter samman fågelberget med den marina miljön.
  - name: Karlsösallat, hjorttunga och kransborre
    category: Flora
    summary: Kalkväxter och sällsynta arter berättar om öns geologi, långvariga bete och isolerade läge.
conservation:
  title: Naturvårdsarbete
  intro: Skyddet handlar både om att bevara det som är känsligt nu och om att fortsätta de processer som format landskapet över lång tid.
  efforts:
    - title: Hänsyn under häckning
      text: Tillträde och rörelsemönster anpassas för att minska störningar under de mest känsliga perioderna.
    - title: Fortsatt hävd
      text: Betespräglade marker behöver skötas för att den öppna karaktären och artrikedomen ska bestå.
    - title: Inventering och tillsyn
      text: Personalen följer utvecklingen i djurliv och växtlighet och vägleder besökare så att skydd och tillgänglighet kan fungera tillsammans.
