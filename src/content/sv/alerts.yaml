items:
  - level: closure
    title: Tillfällig avstängning av den utsatta västra landstigningen
    body: Västliga vindar och dyning gör att angöringen vid den västra landstigningsplatsen tillfälligt stängs tills läget lugnat sig. Guidade turer kan behöva kortas eller flyttas med kort varsel.
    posted: "2026-05-12"
    locations:
      - Västra landstigningsplatsen
      - Klintleden
  - level: caution
    title: Häckningszoner kräver tydligare besöksvägar
    body: Under den mest känsliga delen av häckningen leds besökare om på vissa partier av stigen. Följ dagens skyltning och håll extra avstånd till branta fågelhyllor.
    posted: "2026-05-10"
    locations:
      - Fågelbergets utsikt
      - Östra platån
  - level: caution
    title: Avgångar kan påverkas snabbt av västliga vindskiften
    body: Kontrollera väder- och båtstatus samma morgon som avresa. Även vid i övrigt god prognos kan tilläggning bli svår vid väst, sydväst eller nordväst.
    posted: "2026-05-09"
    locations:
      - Djupviks hamn
      - Landstigningsplatsen
  - level: information
    title: Säsongens guidningar publiceras löpande
    body: Guidade turer och dagsbesök för sommaren uppdateras successivt. Kontrollera bokningsläget före avresa om du planerar ett senare besök under säsongen.
    posted: "2026-05-08"
    locations:
      - Djupviks hamn
  - level: information
    title: Torra kalkmarker ger ojämna stigar i eftermiddagssol
    body: Stigarna är öppna men kan bli mycket torra och hala på lös kalkgrus i stark sol och vind. Stadiga skor rekommenderas även vid lugnt väder.
    posted: "2026-05-06"
    locations:
      - Klintleden
      - Mittplatån
