hero:
  kicker: Nature & wildlife
  title: Bird cliffs, limestone flora, and Baltic coastal ecology make Lilla Karlsö an unusually dense natural environment.
  intro: Within a small area, the island contains seabird colonies, grazed limestone grassland, exposed Baltic habitats, and species that depend on very specific ecological conditions.
  image: /images/guillimot_on_cliff.jpg
ecology:
  kicker: Ecology
  title: A reserve where limestone, sea exposure, and grazing shape the living conditions
  intro: The island's biological richness is the result of geology, salt exposure, long grazing continuity, and coastal climate working together.
  body:
    - Limestone bedrock creates drought-prone, nutrient-poor environments where specialist plants can survive, including species associated with the Karlsö islands and other calcareous habitats.
    - The sea adds salt, moisture, and exposure, while grazing keeps the terrain open. Together these processes create the bird cliffs, flowering grasslands, and long open views across the plateau.
habitats:
  - title: Limestone cliffs
    text: The steep faces are both a geological signature and a breeding structure for large concentrations of common guillemots and razorbills.
  - title: Alvar-like limestone ground
    text: Thin soils and exposed rock create demanding but species-rich plant communities.
  - title: Shore ridges and low plains
    text: These areas show the relationship between sea level history, stone material, and vegetation.
  - title: Grazed grassland
    text: Open flowering surfaces support botanical values and preserve long sightlines across the plateau.
species:
  - name: Common guillemot
    category: Seabird
    summary: One of the reserve's defining species, breeding in dense colonies along the cliff ledges.
  - name: Razorbill
    category: Seabird
    summary: Often seen together with guillemots and a core part of the soundscape above the bird cliffs.
  - name: Peregrine falcon
    category: Raptor
    summary: May be seen hunting above the sea and around the cliffs where breeding birds concentrate.
  - name: Common eider
    category: Seabird
    summary: A characteristic coastal bird of the island's shore zones and nearby waters.
  - name: Grey seal
    category: Marine mammal
    summary: Lives in the waters around the island and connects the bird cliff landscape to the wider marine ecosystem.
  - name: Karlsö plants and limestone specialists
    category: Flora
    summary: Rare and localized plants reflect the island's geology, long grazing continuity, and relative isolation.
conservation:
  title: Conservation work
  intro: Protection means preserving what is fragile today while also maintaining the long processes that formed the landscape.
  efforts:
    - title: Nesting-season care
      text: Access and visitor movement are adjusted to reduce disturbance during the most sensitive breeding periods.
    - title: Continued grazing management
      text: Open grazed land needs active stewardship if its structure and biodiversity are to remain.
    - title: Survey work and supervision
      text: On-island staff monitor wildlife and vegetation while helping visitors understand why certain restrictions and routes are necessary.
